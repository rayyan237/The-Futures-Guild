<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | The Futures Guild</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  </head>
  <body>
    <!-- Simplified Navbar -->
    <div class="nav-wrapper">
      <header class="navbar-pill" style="justify-content: center;">
        <div class="logo">The Futures Guild</div>
      </header>
    </div>

    <!-- 404 Hero Section -->
    <section class="hero" style="min-height: 100vh;">
      <div id="canvas-container"></div>
      <div class="hero-content">
        <div class="badge">✦ ERROR 404</div>
        <h1 style="font-size: clamp(5rem, 12vw, 8rem); color: var(--medium-blue); margin-bottom: 0;">404</h1>
        <h2>Lost in the <span class="highlight">Digital Void.</span></h2>
        <p style="max-width: 500px; margin: 20px auto 40px auto;">
          The page you are looking for has been moved, deleted, or never existed in the first place. Let's get you back on track.
        </p>
        <div class="hero-btns">
          <a href="index.html" class="btn-primary">Return to Homepage ➔</a>
        </div>
      </div>
    </section>

    <!-- We reuse your existing script for the particle background -->
    <script src="script.js"></script>
  </body>
</html>
